name: Padel fetch — 06:50 UTC

on:
  schedule:
    - cron: '50 5 * * *'   # 05:50 UTC = 06:50 BST (summer, UTC+1)
                           # In winter (GMT/UTC+0) this runs at 05:50 local — update to '50 6' then
  workflow_dispatch:         # allow manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout claude/daily-cache
        uses: actions/checkout@v4
        with:
          ref: claude/daily-cache
          # GITHUB_TOKEN is provided automatically; needs contents:write permission above

      - name: Fetch Playtomic availability
        run: python3 scripts/fetch_padel.py "06:50 snapshot"

      - name: Commit and push snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet \
            && echo "No changes — all venues may have errored" \
            || (git commit -m "06:50 snapshot $(date -u +%Y-%m-%d)" && git push)
