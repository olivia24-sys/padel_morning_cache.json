name: Padel fetch — 08:50 UTC

on:
  schedule:
    - cron: '50 8 * * *'   # 08:50 UTC = ~09:50 BST / ~10:50 CEST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout claude/daily-cache
        uses: actions/checkout@v4
        with:
          ref: claude/daily-cache

      - name: Fetch Playtomic availability
        run: python3 scripts/fetch_padel.py "08:50 snapshot"

      - name: Commit and push snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet \
            && echo "No changes — all venues may have errored" \
            || (git commit -m "08:50 snapshot $(date -u +%Y-%m-%d)" && git push)
