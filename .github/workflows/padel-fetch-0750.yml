name: Padel fetch — 07:50 CEST

on:
  schedule:
    - cron: '50 5 * * *'   # 05:50 UTC = 07:50 CEST (summer, UTC+2)
                           # In winter (CET/UTC+1) this runs at 06:50 local — update to '50 6' then
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout claude/daily-cache
        uses: actions/checkout@v4
        with:
          ref: claude/daily-cache

      - name: Fetch Playtomic availability
        run: python3 scripts/fetch_padel.py "07:50 snapshot"

      - name: Commit and push snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet \
            && echo "No changes — all venues may have errored" \
            || (git commit -m "07:50 snapshot $(date -u +%Y-%m-%d)" && git push)
